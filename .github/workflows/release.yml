name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"   # matches v1.0.0, v1.2.3-beta.1, etc.

jobs:
  build-and-release:
    name: Build & publish VSIX
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create the GitHub Release

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Runtime ─────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 3. Version ─────────────────────────────────────────────────────────
      - name: Extract semver from tag
        id: ver
        # GITHUB_REF_NAME is e.g. "v1.2.3" → strip the leading "v"
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VSIX=vscode-ts-chef-${VERSION}.vsix" >> "$GITHUB_OUTPUT"

      - name: Write version into package.json
        # keeps package.json in sync without creating a git commit
        run: npm version "${{ steps.ver.outputs.VERSION }}" --no-git-tag-version

      # ── 4. Build ───────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      # ── 5. Package ─────────────────────────────────────────────────────────
      - name: Package VSIX
        run: |
          npx --yes @vscode/vsce package \
            --no-dependencies \
            --out "${{ steps.ver.outputs.VSIX }}"

      # ── 6. Sanity check ────────────────────────────────────────────────────
      - name: Inspect VSIX contents
        run: |
          echo "=== VSIX size ==="
          ls -lh "${{ steps.ver.outputs.VSIX }}"
          echo "=== Packaged files ==="
          npx --yes @vscode/vsce ls 2>/dev/null | head -40 || true

      # ── 7. Release ─────────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ts-chef ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.ver.outputs.VSIX }}
          # tags like v1.0.0-beta.1 → pre-release
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## ts-chef ${{ github.ref_name }}

            ### Install

            **Option A — VS Code UI**
            1. Download `${{ steps.ver.outputs.VSIX }}` from the assets below.
            2. Open VS Code → **Extensions** (⇧⌘X) → **⋯** → **Install from VSIX…**

            **Option B — command line**
            ```bash
            code --install-extension ${{ steps.ver.outputs.VSIX }}
            ```

            ---

            > ⚠️ This project is in early development. Bugs are expected — please [open an issue](../../issues/new) if something breaks.
