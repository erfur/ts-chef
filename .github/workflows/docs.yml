name: Build Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'README.md'
      - 'package.json'
      - 'typedoc.json'
  workflow_dispatch: 

jobs:
  build-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Generate API Docs
        run: npx typedoc --options typedoc.json

      - name: Verify wiki repository availability
        env:
          GH_TOKEN: ${{ secrets.WIKI_ACTION_TOKEN != '' && secrets.WIKI_ACTION_TOKEN || github.token }}
        run: |
          if ! git ls-remote "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git" HEAD >/dev/null 2>&1; then
            echo "::error::GitHub wiki repository is unavailable. Enable the repository wiki and ensure token permissions allow wiki push."
            exit 1
          fi

      - name: Sync Wiki
        uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          token: ${{ secrets.WIKI_ACTION_TOKEN != '' && secrets.WIKI_ACTION_TOKEN || github.token }}
          path: docs/api
          commit-message: "docs: update API documentation [skip ci]"
