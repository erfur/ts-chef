name: Build Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'README.md'
      - 'package.json'
      - 'typedoc.json'
  workflow_dispatch: 

jobs:
  build-docs:
    name: Build & Sync Wiki
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Generate API Docs
        run: npm run docs

      - name: Sync Wiki
        uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          # Use WIKI_ACTION_TOKEN if available, else fall back to github.token
          token: ${{ secrets.WIKI_ACTION_TOKEN || github.token }}
          path: docs/api
          commit-message: "docs: update API documentation [skip ci]"
