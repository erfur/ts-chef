name: Build & Sync Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'docs/**'
      - 'package.json'
      - 'typedoc.json'
  workflow_dispatch: 

jobs:
  deploy-wiki:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout Source Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate API Documentation
        run: npm run docs

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync to Wiki
        env:
          GH_TOKEN: ${{ secrets.WIKI_ACTION_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          # 1. Clone Wiki Repository into a temporary folder outside workspace
          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          git clone $WIKI_URL /tmp/wiki-sync
          cd /tmp/wiki-sync

          # 2. Configure Git locally
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 3. Clean existing tracked files (to ensure a fresh state)
          # We use git rm -rf . to keep the .git folder intact but clear the worktree
          git rm -rf . --ignore-unmatch

          # 4. Copy newly generated API docs from workspace
          cp -r $GITHUB_WORKSPACE/docs/api/* .

          # 5. Inject manual guides
          [ -f "$GITHUB_WORKSPACE/docs/contributing.md" ] && cp "$GITHUB_WORKSPACE/docs/contributing.md" Contributing.md
          [ -f "$GITHUB_WORKSPACE/docs/operations.md" ] && cp "$GITHUB_WORKSPACE/docs/operations.md" Operations.md
          [ -f "$GITHUB_WORKSPACE/docs/usage.md" ] && cp "$GITHUB_WORKSPACE/docs/usage.md" Usage.md

          # 6. Build/Update Sidebar
          if [ -f "_Sidebar.md" ]; then
            echo -e "\n\n## Guides\n* [[Contributing]]\n* [[Operations]]\n* [[Usage]]" >> _Sidebar.md
          else
            echo -e "## Guides\n* [[Contributing]]\n* [[Operations]]\n* [[Usage]]" > _Sidebar.md
          fi

          # 7. Add all changes
          git add .

          # 8. Commit and Push
          # We check if there's anything to commit first
          if git diff --staged --quiet; then
            echo "Keine Änderungen an der Dokumentation festgestellt."
          else
            git commit -m "docs: auto-update wiki documentation [skip ci]"
            # Push specifically to the 'master' branch for compatibility
            git push origin HEAD:master --force
          fi

