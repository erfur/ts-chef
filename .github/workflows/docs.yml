name: Build Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'README.md'
      - 'package.json'
      - 'typedoc.json'
  workflow_dispatch: 

jobs:
  build-docs:
    name: Build & Sync Wiki
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Generate API Docs
        run: npm run docs

      - name: Sync Wiki manually
        env:
          GH_TOKEN: ${{ secrets.WIKI_ACTION_TOKEN || github.token }}
        run: |
          # Configure Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Clone the wiki repository
          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          git clone $WIKI_URL wiki-repo
          
          # Clean old docs in wiki but keep .git folder
          find wiki-repo -mindepth 1 -not -name '.git' -delete
          
          # Copy newly generated docs (and manually written docs) into the wiki repo
          cp -r docs/api/* wiki-repo/
          
          # Copy manual guides to the wiki repository
          cp docs/contributing.md wiki-repo/Contributing.md
          cp docs/operations.md wiki-repo/Operations.md
          cp docs/usage.md wiki-repo/Usage.md
          
          cd wiki-repo
          
          # Add all changes
          git add .
          
          # Commit if there are changes
          if git diff-index --quiet HEAD --; then
            echo "No changes to documentation."
          else
            git commit -m "docs: update wiki documentation [skip ci]"
            # Push specifically to the 'main' branch
            git push origin HEAD:main --force
          fi
