name: Build Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'README.md'
      - 'package.json'
      - 'typedoc.json'
  workflow_dispatch: 

jobs:
  build-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Generate API Docs
        run: npx typedoc --options typedoc.json

      - name: Check wiki availability
        id: wiki-check
        env:
          GH_TOKEN: ${{ secrets.WIKI_ACTION_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git ls-remote "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git" HEAD >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync Wiki
        if: steps.wiki-check.outputs.exists == 'true'
        uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          token: ${{ secrets.WIKI_ACTION_TOKEN }}
          path: docs/api
          commit-message: "docs: update API documentation [skip ci]"
