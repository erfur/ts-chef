name: Build Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'docs/**'
      - 'package.json'
      - 'typedoc.json'
  workflow_dispatch: 

jobs:
  deploy-wiki:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout Source Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Clone Wiki Repository
        env:
          GH_TOKEN: ${{ secrets.WIKI_ACTION_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          git clone $WIKI_URL wiki-repo

      - name: Generate Wiki Documentation
        run: npx typedoc --cleanOutputDir false

      - name: Inject Manual Documentation & Guides
        run: |
          # Copy manual guides directly into the wiki-repo
          [ -f "docs/contributing.md" ] && cp docs/contributing.md wiki-repo/Contributing.md
          [ -f "docs/operations.md" ] && cp docs/operations.md wiki-repo/Operations.md
          [ -f "docs/usage.md" ] && cp docs/usage.md wiki-repo/Usage.md
          
          # Append Guides to Sidebar if it exists
          if [ -f "wiki-repo/_Sidebar.md" ]; then
            echo -e "\n\n## Guides\n* [[Contributing]]\n* [[Operations]]\n* [[Usage]]" >> wiki-repo/_Sidebar.md
          else
            echo -e "## Guides\n* [[Contributing]]\n* [[Operations]]\n* [[Usage]]" > wiki-repo/_Sidebar.md
          fi

      - name: Commit and Push Changes to Wiki
        run: |
          cd wiki-repo
          
          # Add all changes
          git add .
          
          if git diff-index --quiet HEAD --; then
            echo "Keine Änderungen an der Dokumentation festgestellt."
          else
            git commit -m "docs: auto-update wiki documentation [skip ci]"
            git push origin HEAD:main --force
          fi
